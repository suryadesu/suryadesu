<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surya Sai Teja Desu</title>
    <meta name="description" content="Surya Sai Teja Desu — Quantum Computing Researcher & Systems Engineer.">

    <!-- Tailwind for layout utilities -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
    </script>

    <!-- Three.js (ES module) for the interactive 3D galaxy -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
    </script>

    <style>
        /* ---------- Theme tokens ---------- */
        :root {
            --bg-0: #0a0f16;
            --bg-1: #0f1724;
            --bg-2: #17263b;
            --text-1: #e7ecef;
            --text-2: #c6d1de;
            --text-3: #97a2ad;
            --accent: #6096ba;     /* blue        */
            --accent-2: #a3cef1;   /* sky         */
            --accent-3: #274c77;   /* deep navy   */
            --card-bg: rgba(23, 38, 59, 0.55);
            --card-bg-solid: rgba(23, 38, 59, 0.82);
            --card-border: rgba(96, 150, 186, 0.24);
            --card-border-hover: rgba(96, 150, 186, 0.6);
            --header-bg: rgba(10, 15, 22, 0.6);
            --chip-bg: rgba(96, 150, 186, 0.12);
            --glow: 0 0 40px rgba(96, 150, 186, 0.22);
            --scroll-thumb: #6096ba;
            --veil: rgba(10, 15, 22, 0.74);
            --veil-top: rgba(10, 15, 22, 0.5);
        }
        html.light {
            --bg-0: #e7ecef;
            --bg-1: #eef2f5;
            --bg-2: #d6e3ee;
            --text-1: #1b2c44;
            --text-2: #34475f;
            --text-3: #5c6671;
            --accent: #274c77;
            --accent-2: #6096ba;
            --accent-3: #a3cef1;
            --card-bg: rgba(255, 255, 255, 0.70);
            --card-bg-solid: rgba(255, 255, 255, 0.88);
            --card-border: rgba(39, 76, 119, 0.20);
            --card-border-hover: rgba(39, 76, 119, 0.5);
            --header-bg: rgba(231, 236, 239, 0.7);
            --chip-bg: rgba(39, 76, 119, 0.08);
            --glow: 0 0 40px rgba(39, 76, 119, 0.16);
            --scroll-thumb: #6096ba;
            --veil: rgba(231, 236, 239, 0.82);
            --veil-top: rgba(231, 236, 239, 0.58);
        }

        * { -webkit-tap-highlight-color: transparent; }

        html { scroll-behavior: smooth; }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text-1);
            font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            background:
                radial-gradient(120% 90% at 50% -10%, var(--bg-2) 0%, var(--bg-1) 38%, var(--bg-0) 78%);
            background-attachment: fixed;
            transition: color .5s ease, background .8s ease;
            overflow-x: hidden;
        }

        .font-mono { font-family: ui-monospace, "SF Mono", "Fira Code", Menlo, monospace; }

        /* legibility for text floating over the galaxy */
        html.dark h1, html.dark h2 { text-shadow: 0 2px 22px rgba(2, 1, 8, .6); }
        html.dark .hero-copy { text-shadow: 0 1px 14px rgba(2, 1, 8, .55); }
        html.light h1, html.light h2 { text-shadow: 0 1px 14px rgba(255, 255, 255, .65); }

        /* ---------- 3D canvas ---------- */
        #bg-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        #content { position: relative; z-index: 1; }

        /* soft vignette to seat content over the galaxy */
        #vignette {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background:
                radial-gradient(125% 85% at 50% 42%, transparent 36%, var(--veil) 116%),
                linear-gradient(180deg, var(--veil-top) 0%, transparent 22%);
            transition: background .8s ease;
        }

        /* ---------- Theme-aware components ---------- */
        .txt-1 { color: var(--text-1); }
        .txt-2 { color: var(--text-2); }
        .txt-3 { color: var(--text-3); }
        .accent { color: var(--accent); }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 1rem;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 18px 50px -28px rgba(0, 0, 0, .65);
            transition: border-color .35s ease, transform .35s ease, box-shadow .35s ease, background .8s ease;
        }
        .card:hover {
            border-color: var(--card-border-hover);
            transform: translateY(-3px);
            box-shadow: 0 24px 60px -26px rgba(0, 0, 0, .7), var(--glow);
        }
        .card-solid { background: var(--card-bg-solid); }

        .chip {
            background: var(--chip-bg);
            border: 1px solid var(--card-border);
            color: var(--accent);
            border-radius: .5rem;
            padding: .2rem .55rem;
            font-size: .72rem;
        }

        .gradient-text {
            background: linear-gradient(110deg, #a3cef1, #6096ba 45%, #dbe7f2);
            background-size: 220% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shimmer 7s linear infinite;
        }
        html.light .gradient-text { background-image: linear-gradient(110deg, #16243a, #274c77 42%, #4f86b3); }
        @keyframes shimmer { to { background-position: 220% center; } }

        .link-mono {
            color: var(--text-2);
            font-size: .85rem;
            transition: color .25s ease, text-shadow .25s ease;
        }
        .link-mono:hover { color: var(--accent); text-shadow: 0 0 10px var(--accent); }

        /* ---------- Header / nav ---------- */
        .glass-header {
            background: var(--header-bg);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--card-border);
            transition: background .8s ease, border-color .8s ease;
        }
        .tab-btn {
            color: var(--text-2);
            border: 1px solid transparent;
            border-radius: .5rem;
            padding: .5rem 1rem;
            transition: all .3s ease;
            cursor: pointer;
            background: transparent;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }
        .tab-btn:hover { color: var(--text-1); }
        .tab-btn.active {
            color: var(--accent);
            border-color: var(--card-border-hover);
            background: var(--chip-bg);
            box-shadow: 0 0 18px -4px var(--accent);
        }

        .theme-toggle {
            display: grid; place-items: center;
            width: 2.4rem; height: 2.4rem;
            border-radius: 9999px;
            border: 1px solid var(--card-border);
            background: var(--chip-bg);
            color: var(--accent);
            cursor: pointer;
            transition: transform .4s ease, box-shadow .3s ease, border-color .3s ease;
        }
        .theme-toggle:hover { transform: rotate(25deg) scale(1.08); box-shadow: var(--glow); border-color: var(--card-border-hover); }
        .theme-toggle svg { width: 1.15rem; height: 1.15rem; }
        .icon-sun { display: none; }
        html.light .icon-sun { display: block; }
        html.light .icon-moon { display: none; }

        /* ---------- One-page sections ---------- */
        .tab-content { scroll-margin-top: 6.5rem; }
        main > .tab-content + .tab-content {
            margin-top: 4.5rem; padding-top: 3.25rem;
            border-top: 1px solid var(--card-border);
        }
        main p { line-height: 1.7; }

        .pulse-dot {
            width: .7rem; height: .7rem; border-radius: 9999px;
            background: var(--accent-2);
            box-shadow: 0 0 12px var(--accent-2);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: .4; transform: scale(.8); } }

        /* ---------- Profile orb / tilt card ---------- */
        .tilt-wrap { perspective: 900px; }
        .tilt-card { transition: transform .15s ease-out; transform-style: preserve-3d; }
        .orb-glow {
            position: absolute; inset: -2px; border-radius: 1.1rem;
            background: conic-gradient(from 0deg, var(--accent-3), var(--accent), var(--accent-2), var(--accent-3));
            filter: blur(16px); opacity: .55;
            animation: spin 9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .divider { border-color: var(--card-border); }

        /* ---------- Scrollbar ---------- */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 9999px; border: 2px solid transparent; background-clip: padding-box; }

        ::selection { background: var(--accent); color: #fff; }

        /* ---------- Punchline ---------- */
        .punchline { font-size: clamp(1.5rem, 3.5vw, 2.25rem); font-weight: 700; color: var(--text-1); letter-spacing: .005em; }
        .punchline .accent { color: var(--accent); }
        .caret { display: inline-block; width: .55ch; height: 1.05em; background: var(--accent); margin-left: .12em; vertical-align: -.14em; border-radius: 1px; animation: blink 1.1s steps(1) infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        /* ---------- Redline scroll / RPM bar ---------- */
        #redline {
            position: fixed; top: 0; left: 0; height: 3px; width: 0%;
            z-index: 60; pointer-events: none;
            background: linear-gradient(90deg, var(--accent-3), var(--accent));
            box-shadow: 0 0 12px var(--accent);
        }
    </style>
</head>
<body>
    <!-- Interactive 3D galaxy -->
    <canvas id="bg-canvas"></canvas>
    <div id="vignette"></div>
    <div id="redline"></div>

    <div id="content">
        <!-- ================= HEADER ================= -->
        <header class="sticky top-0 z-50 glass-header">
            <div class="max-w-6xl mx-auto px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-3">
                    <span class="pulse-dot"></span>
                    <span class="font-mono text-xl font-bold tracking-wider txt-1">SURYA DESU<span class="accent"> </span></span>
                </div>

                <div class="flex items-center gap-3">
                    <nav class="flex flex-wrap justify-center gap-1.5 font-mono text-sm">
                        <a href="#about"    data-nav="about"    class="tab-btn active">About</a>
                        <a href="#research" data-nav="research" class="tab-btn">Research</a>
                        <a href="#projects" data-nav="projects" class="tab-btn">Projects</a>
                        <a href="#gallery"  data-nav="gallery"  class="tab-btn">Gallery</a>
                        <a href="#gaming"   data-nav="gaming"   class="tab-btn">Gaming</a>
                    </nav>

                    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark / light mode" title="Toggle theme">
                        <!-- moon (shown in dark) -->
                        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                        </svg>
                        <!-- sun (shown in light) -->
                        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="4.5"/>
                            <path d="M12 2v2.5M12 19.5V22M4.2 4.2l1.8 1.8M18 18l1.8 1.8M2 12h2.5M19.5 12H22M4.2 19.8 6 18M18 6l1.8-1.8"/>
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <main class="max-w-6xl mx-auto px-6 py-12">

            <!-- ===== ABOUT ===== -->
            <section id="about" class="tab-content active space-y-12">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-10 items-center">
                    <div class="md:col-span-2 space-y-5">
                        <p id="hero-kicker" class="font-mono text-sm accent tracking-widest uppercase hero-copy"></p>
                        <h1 id="hero-name" class="text-4xl md:text-6xl font-black tracking-tight gradient-text leading-tight"></h1>
                        <p id="hero-roles" class="text-xl font-mono txt-2 hero-copy"></p>
                        <p id="hero-bio" class="txt-2 leading-relaxed text-lg hero-copy"></p>
                        <div id="hero-social" class="flex flex-wrap gap-5 pt-2 font-mono"></div>
                    </div>

                    <div class="flex justify-center tilt-wrap">
                        <div class="relative group tilt-card" id="profile-orb">
                            <div class="orb-glow"></div>
                            <div class="relative w-60 h-60 rounded-2xl card-solid card overflow-hidden flex items-center justify-center">
                                <img id="hero-photo" alt="" class="absolute inset-0 w-full h-full object-cover" onerror="this.remove()">
                                <span class="txt-3 font-mono text-xs text-center px-4">[ profile photo ]</span>
                            </div>
                        </div>
                    </div>
                </div>

                <p class="punchline font-mono"><span class="accent">&gt;_</span> <span id="hero-punchline"></span><span class="caret"></span></p>

                <div class="card p-6 md:p-8">
                    <h3 class="text-xl font-bold font-mono txt-1 mb-5 flex items-center gap-2"><span class="accent">&gt;</span> <span id="education-title"></span></h3>
                    <div id="education-list" class="space-y-4"></div>
                </div>
            </section>

            <!-- ===== RESEARCH ===== -->
            <section id="research" class="tab-content space-y-8">
                <div class="space-y-2">
                    <h2 id="research-title" class="text-3xl font-extrabold tracking-tight font-mono txt-1"></h2>
                    <p id="research-intro" class="txt-2 max-w-2xl"></p>
                </div>
                <div id="research-list" class="grid grid-cols-1 gap-6"></div>
            </section>

            <!-- ===== PROJECTS ===== -->
            <section id="projects" class="tab-content space-y-8">
                <h2 id="projects-title" class="text-3xl font-extrabold tracking-tight font-mono txt-1"></h2>
                <div id="projects-list" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            </section>

            <!-- ===== GALLERY ===== -->
            <section id="gallery" class="tab-content space-y-8">
                <h2 id="gallery-title" class="text-3xl font-extrabold tracking-tight font-mono txt-1"></h2>
                <div id="gallery-list" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4"></div>
            </section>

            <!-- ===== GAMING ===== -->
            <section id="gaming" class="tab-content space-y-8">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                    <div>
                        <h2 id="gaming-title" class="text-3xl font-extrabold tracking-tight font-mono txt-1"></h2>
                        <p id="gaming-intro" class="txt-2 text-sm mt-1"></p>
                    </div>
                    <span id="gaming-badge" class="font-mono text-xs uppercase px-3 py-1 rounded-full tracking-wider whitespace-nowrap" style="background: var(--chip-bg); color: var(--accent); border:1px solid var(--card-border-hover);"></span>
                </div>
                <div id="gaming-list" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            </section>

        </main>

        <footer class="max-w-6xl mx-auto px-6 py-10 text-center">
            <p class="font-mono text-xs txt-3">Trying to be better than yesterday, every day </p>
        </footer>
    </div>

    <!-- ============ SITE CONTENT — EDIT TEXT & ADD ITEMS HERE ============ -->
    <script>
        /* ───────────────────────────────────────────────────────────────
           EDIT EVERYTHING IN `CONTENT` BELOW.
           • Change any text by editing its string.
           • Add a card: copy one { … } block inside the relevant `items`
             array and tweak the fields. Array order = order on the page.
           ─────────────────────────────────────────────────────────────── */
        const CONTENT = {
            profile: {
                kicker: "// hello — welcome to my corner of the universe",
                name: "Surya Sai Teja Desu",
                roles: "Entrepreneur · Quantum Computing & AI Researcher · Systems Engineer · Project Manager",
                bio: "My happy place is the seam between deep theory and infrastructure that ships — where an elegant proof has to survive contact with real hardware, real latency, and real deadlines. I gravitate toward problems that are equal parts beautiful and stubborn, and I tend to stick around long after the exciting part is done: past the prototype, past the demo, until the thing actually works — and keeps working.",
                punchline: "Think. Code. Repeat.",
                photo: "assets/profile/profile.jpg",
                links: [
                    { label: "Email", href: "mailto:desusurya.work@gmail.com" },
                    { label: "GitHub", href: "https://github.com/suryadesu/" },
                    { label: "LinkedIn", href: "https://www.linkedin.com/in/surya-sai-teja/" },
                    { label: "Scholar", href: "https://scholar.google.com/citations?user=das7IggAAAAJ&hl=en" },
                ],
            },
            education: {
                title: "Education & Honors",
                entries: [
                    { school: "IIT Hyderabad", detail: "Dual Degree (B.Tech Honors + M.Tech) in Computer Science & Engineering", sub: "Second Major in Mechanical Engineering" },
                ],
                note: "Recipient of the Kesav Nori Research Excellence Award and multiple Academic Excellence honors.",
            },
            research: {
                title: ">_ Selected Publications",
                intro: "Peer-reviewed work I've authored — each with the one idea that matters, in plain English.",
                items: [
                    { tag: "FORMATS", title: "Model Checking for Entanglement Swapping", authors: "Desu, S. S. T., Srivastava, A., & Rao, M. P.", takeaway: "We modeled noisy, time-sensitive quantum repeaters as probabilistic timed automata and verified them in PRISM. Switching to its digital-clocks engine tamed the state-space explosion — so you can catch a quantum network's failure modes on paper, before anyone builds the hardware." },
                    { tag: "ICCS", title: "Adiabatic Quantum Feature Selection for Sparse Linear Regression", authors: "Desu, S. S. T., Srijith, P. K., Rao, M. P., & Sivadasan, N.", takeaway: "We recast feature selection as a QUBO and let a quantum annealer prune the noise from sparse regression. The real work is translating statistical penalties into something today's NISQ hardware can optimize — useful now, not someday." },
                ],
            },
            projects: {
                title: ">_ Things I've Built",
                items: [
                    { title: "Hybrid Quantum-Classical Scale Framework", description: "A hybrid engine that splits optimization across classical machines and noisy quantum processors. In a year we took it from 100 variables to over a million — solving instances classical solvers couldn't even begin.", tags: ["Qiskit", "Python", "Docker"] },
                    { title: "Inexact Qubit Mapping Optimization Compiler", description: "A compiler that knows when \"good enough\" is good enough. It finds the non-critical paths in large quantum circuits and relaxes their routing, cutting the physical qubits a program needs to run.", tags: ["Graph Theory", "Compilers", "C++"] },
                ],
            },
            gallery: {
                title: ">_ Visual Log",
                items: [
                    { src: "assets/gallery/1.jpg", caption: "Research Conference Presentation" },
                    { src: "assets/gallery/2.jpg", caption: "Lab Benchmark Graph Output" },
                    { src: "assets/gallery/3.jpg", caption: "Team R&D Hackathon Frame" },
                ],
            },
            gaming: {
                title: ">_ Rec Room // Competitive Clips",
                intro: "When I'm not chasing qubits, I'm chasing aces. A few highlights from the ranked grind.",
                badge: "VALORANT // RADIANT_TRACKS",
                items: [
                    { src: "your-clip-url.mp4", label: "Bind // Ace Clutch Clip Entry", title: "Clutch Defensive Hold (Jett - Matchpoint)", meta: "Rank: Immortal Lobby // Variable Eco Round Execution" },
                    { src: "your-clip-2-url.mp4", label: "Haven // Site Retake Entry", title: "Perfect Retake Alignment (Omen Flank Control)", meta: "Rank: Immortal Lobby // Crosshair Placement Highlight" },
                ],
            },
        };

        /* ── Rendering — you usually don't need to touch below ── */
        (function renderSite() {
            const $ = (id) => document.getElementById(id);
            const esc = (s) => String(s == null ? "" : s)
                .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");

            const p = CONTENT.profile;
            $("hero-kicker").textContent = p.kicker;
            $("hero-name").textContent = p.name;
            $("hero-roles").textContent = p.roles;
            $("hero-bio").textContent = p.bio;
            $("hero-punchline").textContent = p.punchline;
            const photo = $("hero-photo");
            photo.alt = p.name;
            photo.src = p.photo;
            $("hero-social").innerHTML = p.links.map((l) =>
                `<a href="${esc(l.href)}"${/^https?:/.test(l.href) ? ' target="_blank" rel="noopener noreferrer"' : ""} class="link-mono">&gt;_ ${esc(l.label)}</a>`
            ).join("");

            const e = CONTENT.education;
            $("education-title").textContent = e.title;
            $("education-list").innerHTML =
                e.entries.map((en) =>
                    `<div class="flex flex-col sm:flex-row justify-between sm:items-center border-b divider pb-3">
                        <div class="txt-1">
                            <span class="font-bold">${esc(en.school)}</span>
                            <span class="txt-2"> — ${esc(en.detail)}</span>
                            ${en.sub ? `<span class="block txt-3 text-sm mt-1">${esc(en.sub)}</span>` : ""}
                        </div>
                    </div>`).join("") +
                (e.note ? `<p class="text-sm txt-2">${esc(e.note)}</p>` : "");

            const r = CONTENT.research;
            $("research-title").textContent = r.title;
            $("research-intro").textContent = r.intro;
            $("research-list").innerHTML = r.items.map((it) =>
                `<div class="card p-6">
                    <span class="chip font-mono">${esc(it.tag)}</span>
                    <h3 class="text-xl font-bold txt-1 mt-3">${esc(it.title)}</h3>
                    <p class="text-sm txt-3 italic mt-1">${esc(it.authors)}</p>
                    <div class="mt-4 p-4 rounded-lg" style="background: rgba(96,150,186,0.06); border-left: 2px solid var(--accent);">
                        <span class="text-xs font-mono uppercase block tracking-wider font-bold" style="color: var(--accent);">In plain English:</span>
                        <p class="txt-2 text-sm mt-1 leading-relaxed">${esc(it.takeaway)}</p>
                    </div>
                </div>`).join("");

            const pr = CONTENT.projects;
            $("projects-title").textContent = pr.title;
            $("projects-list").innerHTML = pr.items.map((it) =>
                `<div class="card p-6 flex flex-col justify-between">
                    <div>
                        <h3 class="text-xl font-bold txt-1">${esc(it.title)}</h3>
                        <p class="text-sm txt-2 mt-2 leading-relaxed">${esc(it.description)}</p>
                    </div>
                    <div class="mt-6 flex flex-wrap gap-2 font-mono">
                        ${(it.tags || []).map((t) => `<span class="chip">${esc(t)}</span>`).join("")}
                    </div>
                </div>`).join("");

            const g = CONTENT.gallery;
            $("gallery-title").textContent = g.title;
            $("gallery-list").innerHTML = g.items.map((it) =>
                `<div class="aspect-square card flex items-center justify-center p-4 text-center relative overflow-hidden">
                    <img src="${esc(it.src)}" alt="${esc(it.caption)}" class="absolute inset-0 w-full h-full object-cover" onerror="this.remove()">
                    <span class="txt-3 text-sm font-mono">${esc(it.caption)}</span>
                </div>`).join("");

            const gm = CONTENT.gaming;
            $("gaming-title").textContent = gm.title;
            $("gaming-intro").textContent = gm.intro;
            $("gaming-badge").textContent = gm.badge;
            $("gaming-list").innerHTML = gm.items.map((it) =>
                `<div class="card overflow-hidden">
                    <div class="aspect-video bg-black flex items-center justify-center relative">
                        <video controls class="w-full h-full object-cover"><source src="${esc(it.src)}" type="video/mp4"></video>
                        <div class="absolute inset-0 flex items-center justify-center pointer-events-none bg-black/30">
                            <span class="text-xs font-mono text-slate-200 bg-black/80 px-3 py-1.5 rounded">${esc(it.label)}</span>
                        </div>
                    </div>
                    <div class="p-4">
                        <h4 class="font-bold txt-1 text-base">${esc(it.title)}</h4>
                        <p class="text-xs txt-3 mt-1 font-mono">${esc(it.meta)}</p>
                    </div>
                </div>`).join("");
        })();
    </script>

    <!-- ============ TAB ROUTER + THEME (no 3D dependency) ============ -->
    <script>
        // Scroll-spy: highlight the nav link for the section currently in view
        const navLinks = [...document.querySelectorAll('.tab-btn')];
        const sections = navLinks.map(a => document.getElementById(a.dataset.nav)).filter(Boolean);
        const setActive = (id) => navLinks.forEach(a => a.classList.toggle('active', a.dataset.nav === id));
        const spy = new IntersectionObserver((entries) => {
            entries.forEach((e) => { if (e.isIntersecting) setActive(e.target.id); });
        }, { rootMargin: '-45% 0px -50% 0px', threshold: 0 });
        sections.forEach(s => spy.observe(s));

        // Theme (persisted). window.__onThemeChange is set by the 3D module.
        const root = document.documentElement;
        function setTheme(theme) {
            root.classList.toggle('light', theme === 'light');
            root.classList.toggle('dark', theme !== 'light');
            localStorage.setItem('theme', theme);
            if (window.__onThemeChange) window.__onThemeChange(theme);
        }
        (function initTheme() {
            const saved = localStorage.getItem('theme');
            const prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
            setTheme(saved || (prefersLight ? 'light' : 'dark'));
        })();
        document.getElementById('theme-toggle').addEventListener('click', () => {
            setTheme(root.classList.contains('light') ? 'dark' : 'light');
        });

        // Profile card 3D tilt
        const orb = document.getElementById('profile-orb');
        const wrap = orb.closest('.tilt-wrap');
        wrap.addEventListener('mousemove', (e) => {
            const r = wrap.getBoundingClientRect();
            const px = (e.clientX - r.left) / r.width - 0.5;
            const py = (e.clientY - r.top) / r.height - 0.5;
            orb.style.transform = `rotateY(${px * 18}deg) rotateX(${-py * 18}deg)`;
        });
        wrap.addEventListener('mouseleave', () => { orb.style.transform = 'rotateY(0) rotateX(0)'; });
    </script>

    <!-- ============ INTERACTIVE 3D GALAXY (Three.js) ============ -->
    <script type="module">
        import * as THREE from 'three';

        const canvas = document.getElementById('bg-canvas');
        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 100);
        camera.position.set(0, 2.8, 7.2);

        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));

        // ---- Theme color palettes for the cosmos ----
        const PALETTE = {
            dark:  { inside: '#a3cef1', outside: '#274c77', star: '#cdd9e6', starOpacity: 0.5,  galaxyOpacity: 0.55, blending: THREE.AdditiveBlending },
            light: { inside: '#274c77', outside: '#6096ba', star: '#8ba6bd', starOpacity: 0.34, galaxyOpacity: 0.5,  blending: THREE.NormalBlending }
        };

        // ---- Galaxy generator ----
        const galaxyCfg = { count: 16000, radius: 6.0, branches: 4, spin: 1.0, randomness: 0.32, randomnessPower: 3.2, size: 0.03 };
        let galaxy = null;

        function buildGalaxy(theme) {
            const p = PALETTE[theme] || PALETTE.dark;
            if (galaxy) {
                galaxy.geometry.dispose();
                galaxy.material.dispose();
                scene.remove(galaxy);
            }
            const geo = new THREE.BufferGeometry();
            const positions = new Float32Array(galaxyCfg.count * 3);
            const colors = new Float32Array(galaxyCfg.count * 3);
            const cIn = new THREE.Color(p.inside);
            const cOut = new THREE.Color(p.outside);

            for (let i = 0; i < galaxyCfg.count; i++) {
                const i3 = i * 3;
                const r = Math.pow(Math.random(), 1.4) * galaxyCfg.radius;
                const branch = (i % galaxyCfg.branches) / galaxyCfg.branches * Math.PI * 2;
                const spin = r * galaxyCfg.spin;
                const rp = galaxyCfg.randomnessPower;
                const rand = () => Math.pow(Math.random(), rp) * (Math.random() < 0.5 ? 1 : -1) * galaxyCfg.randomness * r;

                positions[i3]     = Math.cos(branch + spin) * r + rand();
                positions[i3 + 1] = rand() * 0.5;
                positions[i3 + 2] = Math.sin(branch + spin) * r + rand();

                const col = cIn.clone().lerp(cOut, r / galaxyCfg.radius);
                colors[i3] = col.r; colors[i3 + 1] = col.g; colors[i3 + 2] = col.b;
            }
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const mat = new THREE.PointsMaterial({
                size: galaxyCfg.size,
                sizeAttenuation: true,
                depthWrite: false,
                blending: p.blending,
                vertexColors: true,
                transparent: true,
                opacity: p.galaxyOpacity
            });
            galaxy = new THREE.Points(geo, mat);
            galaxy.rotation.x = 0.62;
            galaxy.position.set(0.4, -1.4, 0);
            scene.add(galaxy);
        }

        // ---- Background starfield ----
        let stars = null;
        function buildStars(theme) {
            const p = PALETTE[theme] || PALETTE.dark;
            if (stars) { stars.geometry.dispose(); stars.material.dispose(); scene.remove(stars); }
            const n = 650;
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(n * 3);
            for (let i = 0; i < n; i++) {
                const i3 = i * 3;
                pos[i3]     = (Math.random() - 0.5) * 60;
                pos[i3 + 1] = (Math.random() - 0.5) * 60;
                pos[i3 + 2] = (Math.random() - 0.5) * 60;
            }
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const mat = new THREE.PointsMaterial({
                color: new THREE.Color(p.star),
                size: 0.05,
                sizeAttenuation: true,
                transparent: true,
                opacity: p.starOpacity,
                depthWrite: false,
                blending: p.blending
            });
            stars = new THREE.Points(geo, mat);
            scene.add(stars);
        }

        function rebuild(theme) { buildGalaxy(theme); buildStars(theme); }
        rebuild(document.documentElement.classList.contains('light') ? 'light' : 'dark');

        // expose recolor hook to the theme toggle
        window.__onThemeChange = (theme) => rebuild(theme === 'light' ? 'light' : 'dark');

        // ---- Interaction: mouse parallax + scroll zoom ----
        const mouse = { x: 0, y: 0 };
        addEventListener('mousemove', (e) => {
            mouse.x = e.clientX / innerWidth - 0.5;
            mouse.y = e.clientY / innerHeight - 0.5;
        });
        let scrollFactor = 0, lastScrollY = window.scrollY, warp = 0;
        const redline = document.getElementById('redline');
        addEventListener('scroll', () => {
            const max = Math.max(1, document.body.scrollHeight - innerHeight);
            scrollFactor = Math.min(1, scrollY / max);
            warp = Math.min(1, warp + Math.abs(scrollY - lastScrollY) * 0.012);
            lastScrollY = scrollY;
            if (redline) redline.style.width = (scrollFactor * 100) + '%';
        }, { passive: true });

        addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
            renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        });

        const clock = new THREE.Clock();
        function tick() {
            const t = clock.getElapsedTime();
            warp *= 0.94;
            if (galaxy) galaxy.rotation.y += 0.0007 + warp * 0.022;
            if (stars) {
                stars.rotation.y += 0.0002 + warp * 0.012;
                if (stars.material) stars.material.size = 0.05 + warp * 0.22;
            }

            const targetX = mouse.x * 1.8;
            const targetY = 2.8 + (-mouse.y * 1.4);
            const targetZ = 7.2 + scrollFactor * 2.6 - warp * 1.6;
            camera.position.x += (targetX - camera.position.x) * 0.045;
            camera.position.y += (targetY - camera.position.y) * 0.045;
            camera.position.z += (targetZ - camera.position.z) * 0.045;
            camera.lookAt(0, 0, 0);

            renderer.render(scene, camera);
            requestAnimationFrame(tick);
        }
        tick();
    </script>
</body>
</html>
